<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sabo-TopUp | Fast & Secure</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config({theme:{extend:{colors:{primary:'#7C3AED',dark:'#0F172A',card:'#1E293B'}}}})
    </script>
</head>
<body class="bg-dark text-gray-100 min-h-screen">
    <header class="bg-card py-4 px-6 shadow-lg sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold text-primary">⚡ SABO-TOPUP</h1>
            <p class="text-sm text-gray-400">Fast • Secure • Instant</p>
        </div>
    </header>
    <main class="max-w-6xl mx-auto px-4 py-8">
        <h2 class="text-2xl font-semibold mb-6 text-center">Select Your Game</h2>
        <div class="grid md:grid-cols-2 gap-6">
            <div class="bg-card rounded-xl p-6 hover:ring-2 ring-primary transition-all">
                <div class="flex items-center gap-4 mb-4">
                    <i class="fa-solid fa-gun text-4xl text-orange-500"></i>
                    <div><h3 class="text-xl font-bold">PUBG Mobile UC</h3><p class="text-gray-400">Instant Delivery</p></div>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <button class="bg-dark p-3 rounded hover:bg-primary/30">60 UC<br>৳ 85</button>
                    <button class="bg-dark p-3 rounded hover:bg-primary/30">300 UC<br>৳ 420</button>
                    <button class="bg-dark p-3 rounded hover:bg-primary/30">600 UC<br>৳ 830</button>
                    <button class="bg-dark p-3 rounded hover:bg-primary/30">1500 UC<br>৳ 1950</button>
                </div>
            </div>
            <div class="bg-card rounded-xl p-6 hover:ring-2 ring-primary transition-all">
                <div class="flex items-center gap-4 mb-4">
                    <i class="fa-solid fa-sword text-4xl text-red-500"></i>
                    <div><h3 class="text-xl font-bold">MLBB Diamonds</h3><p class="text-gray-400">Safe & Fast</p></div>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <button class="bg-dark p-3 rounded hover:bg-primary/30">56 Diamonds<br>৳ 90</button>
                    <button class="bg-dark p-3 rounded hover:bg-primary/30">280 Diamonds<br>৳ 430</button>
                    <button class="bg-dark p-3 rounded hover:bg-primary/30">560 Diamonds<br>৳ 840</button>
                    <button class="bg-dark p-3 rounded hover:bg-primary/30">1500 Diamonds<br>৳ 2000</button>
                </div>
            </div>
        </div>
        <div class="mt-8 bg-card p-6 rounded-xl">
            <h3 class="text-lg font-semibold mb-3">How to Buy</h3>
            <p class="text-gray-300">1. Pick amount → 2. Enter Game ID → 3. Pay bKash/Nagad → 4. Get items instantly!</p>
        </div>
    </main>
    <footer class="bg-card py-4 mt-8 text-center text-gray-400 text-sm">© 2026 Sabo-TopUp</footer>
</body>
</html>
